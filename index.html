<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#1E0A4A">
<link rel="apple-touch-icon" href="R%20Star%20App%20Icon.png">
<title>Rev3</title>
<link href="https://fonts.googleapis.com/css2?family=Coda:wght@400;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Dark (default) — deep purple · gold accent */
  --bg:#0C0820; --bg2:#160D35; --bg3:#1E1445; --bg4:#2A1C5A;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14); --border3:rgba(255,255,255,0.26);
  --text:#F0EBF8; --text2:#C4B8D8; --text3:#6B5B8A;
  --accent:#D4AF37; --accent-dim:rgba(212,175,55,0.15);
  --green:#34d399; --green-dim:rgba(52,211,153,0.11);
  --blue:#A78BFA; --blue-dim:rgba(167,139,250,0.14);
  --red:#f87171; --red-dim:rgba(248,113,113,0.11);
  --purple:#A78BFA; --purple-dim:rgba(167,139,250,0.11);
  --shadow:rgba(0,0,0,0.6);
  --font:'Coda',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --nav-h:56px;
  /* Safe areas — critical for Face ID */
  --sat:env(safe-area-inset-top,44px);
  --sab:env(safe-area-inset-bottom,34px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
  --r:10px; --r-lg:14px;
}
