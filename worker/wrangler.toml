name = "training-app-worker"
main = "index.js"
compatibility_date = "2025-01-01"

[vars]
# The full URL of your deployed app
APP_URL = "https://bruces6.github.io/training-app"

# STRAVA_CLIENT_ID and STRAVA_CLIENT_SECRET must be set as Secrets in the
# Cloudflare dashboard (Settings → Variables and Secrets → Add → Secret).
# Do NOT put them here — [vars] entries overwrite dashboard values on every deploy.

[[kv_namespaces]]
# KV namespace for health data — binding name must stay HEALTH_DATA
binding = "HEALTH_DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
