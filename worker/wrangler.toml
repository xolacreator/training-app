name = "training-app-worker"
main = "index.js"
compatibility_date = "2025-01-01"

[vars]
# Your Strava Client ID (a number — from strava.com/settings/api)
STRAVA_CLIENT_ID = "REPLACE_WITH_CLIENT_ID"
# The full URL of your deployed app
APP_URL = "https://YOUR_GITHUB_USERNAME.github.io/training-app/"

[[kv_namespaces]]
# Create a KV namespace named HEALTH_DATA in the Cloudflare dashboard and paste its ID below
binding = "HEALTH_DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
